name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Decide which images to build. backend/** drives backend + mcp (same module);
  # frontend/** drives frontend. workflow_dispatch builds everything.
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
      any: ${{ steps.matrix.outputs.any }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Build matrix
        id: matrix
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          BACKEND: ${{ steps.changes.outputs.backend }}
          FRONTEND: ${{ steps.changes.outputs.frontend }}
        run: |
          items=()
          if [ "$DISPATCH" = "true" ] || [ "$BACKEND" = "true" ]; then
            items+=('{"name":"backend","context":"./backend","dockerfile":"./backend/Dockerfile"}')
            items+=('{"name":"mcp","context":"./backend","dockerfile":"./backend/Dockerfile.mcp"}')
          fi
          if [ "$DISPATCH" = "true" ] || [ "$FRONTEND" = "true" ]; then
            items+=('{"name":"frontend","context":"./frontend","dockerfile":"./frontend/Dockerfile"}')
          fi
          joined=$(IFS=,; echo "${items[*]}")
          echo "value={\"include\":[$joined]}" >> "$GITHUB_OUTPUT"
          if [ ${#items[@]} -gt 0 ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "Will build: ${items[*]:-<none>}"

  build-and-push:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image reference for ghcr.
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so the matrix jobs don't evict each other.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64,linux/arm64
