name: Build and Push Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Decide which images to build. backend/** drives backend + mcp (same module);
  # frontend/** drives frontend. workflow_dispatch builds everything.
  # Emits a per-(image,platform) build matrix and a per-image merge matrix.
  detect:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.matrix.outputs.build }}
      merge: ${{ steps.matrix.outputs.merge }}
      any: ${{ steps.matrix.outputs.any }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

      - name: Build matrices
        id: matrix
        env:
          # A tag push (release) has no path diff, so build everything — same as dispatch.
          ALL: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
          BACKEND: ${{ steps.changes.outputs.backend }}
          FRONTEND: ${{ steps.changes.outputs.frontend }}
        run: |
          build=(); merge=()
          add() { # name context dockerfile
            for plat in linux/amd64 linux/arm64; do
              build+=("{\"name\":\"$1\",\"context\":\"$2\",\"dockerfile\":\"$3\",\"platform\":\"$plat\"}")
            done
            merge+=("{\"name\":\"$1\"}")
          }
          if [ "$ALL" = "true" ] || [ "$BACKEND" = "true" ]; then
            add backend ./backend ./backend/Dockerfile
            add mcp ./backend ./backend/Dockerfile.mcp
          fi
          if [ "$ALL" = "true" ] || [ "$FRONTEND" = "true" ]; then
            add frontend ./frontend ./frontend/Dockerfile
          fi
          b=$(IFS=,; echo "${build[*]}"); m=$(IFS=,; echo "${merge[*]}")
          echo "build={\"include\":[$b]}" >> "$GITHUB_OUTPUT"
          echo "merge={\"include\":[$m]}" >> "$GITHUB_OUTPUT"
          if [ ${#merge[@]} -gt 0 ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "Will build: ${merge[*]:-<none>}"

  # Build each image+arch on its NATIVE runner (no QEMU), push by digest.
  build:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.build) }}
    steps:
      - name: Prepare
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY}/${{ matrix.name }}"
          echo "IMAGE=${image,,}" >> "$GITHUB_ENV"
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-${{ env.PLATFORM_PAIR }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.name }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          retention-days: 1

  # Stitch the per-arch digests into a multi-arch manifest list per image.
  merge:
    needs: [detect, build]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJSON(needs.detect.outputs.merge) }}
    steps:
      - name: Prepare
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY}/${{ matrix.name }}"
          echo "IMAGE=${image,,}" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
