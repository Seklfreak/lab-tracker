name: iOS

# Compile-check the SwiftUI app. Path-gated so it only spends the (pricier)
# macOS runner minutes when the iOS app actually changes. Separate from the
# Test workflow on purpose: a broken iOS build shouldn't block backend/frontend
# releases (the iOS app isn't part of the published images).
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yaml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yaml"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Tooling
        run: |
          brew install xcodegen swiftlint
          xcodebuild -version

      - name: Generate project
        working-directory: ios
        run: xcodegen generate

      - name: SwiftLint
        working-directory: ios
        run: swiftlint lint --strict

      - name: Build + test (iOS Simulator, unsigned)
        working-directory: ios
        run: |
          SIM=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; d=json.load(sys.stdin)['devices']; print(next(x['udid'] for r in d.values() for x in r if 'iPhone' in x['name']))")
          echo "Using simulator $SIM"
          xcodebuild test \
            -project LabTracker.xcodeproj -scheme LabTracker \
            -destination "id=$SIM" \
            CODE_SIGNING_ALLOWED=NO
