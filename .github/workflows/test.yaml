name: Test

# Runs on every PR (incl. Renovate's) and on main. Renovate waits for these
# checks to pass before auto-merging non-major dependency updates.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build + test
        working-directory: backend
        run: |
          go build ./...
          go test ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install + typecheck/build + test
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm test
