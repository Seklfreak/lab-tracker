server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Static SPA only. /api and /health are routed to the backend by Traefik
  # (same host, so the browser stays same-origin — no CORS, no nginx upstream
  # dependency / startup DNS race).

  # Vite emits content-hashed asset filenames, so a given /assets/ URL never
  # changes — cache it hard.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The entry point, runtime OIDC config, and the SPA shell served on deep links
  # must always be revalidated, so a new deploy (or OIDC config change) takes
  # effect without the user manually clearing Safari's cache.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
