name: LabTracker
options:
  bundleIdPrefix: dev.winkler
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
targets:
  LabTracker:
    type: application
    platform: iOS
    sources:
      - LabTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.winkler.labtracker
        INFOPLIST_FILE: LabTracker/Info.plist
